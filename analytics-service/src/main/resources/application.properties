# ===================================================================
# DATABASE CONNECTION CONFIGURATION (THE REPORTING DATA LAYER)
# ===================================================================

# Tells this service to connect to the exact same MySQL container on port 3306.
spring.datasource.url=jdbc:mysql://localhost:3306/job_tracker_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root

# SECURE: Pulls DB_PASSWORD from environment, falls back to 'rootpassword' for local Docker development
spring.datasource.password=${DB_PASSWORD:rootpassword}

# Tells Hibernate to automatically build our operational reporting tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# APACHE KAFKA CONSUMER CONFIGURATION
# ===================================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=analytics-group
spring.kafka.consumer.auto-offset-reset=latest

# Tell the Spring framework engine to use the ErrorHandling wrapper shells automatically
spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# Inject the true target delegate execution classes text paths 
spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JacksonJsonDeserializer

# THE FULL-STACK ALIGNMENT KEYS:
# 1. Map incoming events straight to your local layout model class definition
spring.kafka.consumer.properties.spring.json.value.default.type=com.tracker.analytics_service.dto.JobStatusEvent

# 2. Force the Jackson mapper to trust your cross-service data packet namespaces
spring.kafka.consumer.properties.spring.json.trusted.packages=*



# Force the analytics engine to run on port 8081
server.port=8081
