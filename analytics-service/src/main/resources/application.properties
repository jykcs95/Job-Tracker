# ===================================================================
# DATABASE CONNECTION CONFIGURATION (THE REPORTING DATA LAYER)
# ===================================================================

# Tells this service to connect to the exact same MySQL container on port 3306.
spring.datasource.url=jdbc:mysql://localhost:3306/job_tracker_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root

# SECURE: Pulls DB_PASSWORD from environment, falls back to 'rootpassword' for local Docker development
spring.datasource.password=${DB_PASSWORD:rootpassword}

# Tells Hibernate to automatically build our operational reporting tables.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===================================================================
# APACHE KAFKA CONSUMER CONFIGURATION
# ===================================================================

# Tells our application where to find our running Kafka broker container (Port 9092)
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=analytics-group
spring.kafka.consumer.auto-offset-reset=earliest

# Defines how Kafka translates messages coming off the network.
# Translates text keys back into Strings, and JSON payloads back into Java Objects.
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

# Trusted Packages setup tells Spring Kafka it is completely safe to deserialize data
# into our custom event objects across our application.
spring.kafka.consumer.properties.spring.json.trusted.packages=*

